name: Publish AiSdlc.Events.Contract

on:
  push:
    tags:
      - 'contract-v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Derive version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/contract-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/contract-v}"
          else
            VERSION="$(grep -oP '(?<=<Version>)[^<]+' src/AiSdlc.Events.Contract/AiSdlc.Events.Contract.csproj)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved package version: ${VERSION}"

      - name: Restore
        run: dotnet restore src/AiSdlc.Events.Contract/AiSdlc.Events.Contract.csproj

      - name: Build
        run: dotnet build src/AiSdlc.Events.Contract/AiSdlc.Events.Contract.csproj --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: dotnet pack src/AiSdlc.Events.Contract/AiSdlc.Events.Contract.csproj --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate

name: Agent Worker (mesh spike)

# Zero-idle-burn worker for the agent mesh (see docs/roadmap/agent-mesh-spike.md).
# The orchestrator dispatches by labelling an issue `agent:worker`. GitHub's event
# system is the "monitor"; this workflow is the "nudge" — Claude runs headless only
# when there is a task, the reply is posted back as a comment, and the run exits.
# Nothing polls and nothing idles, so there is no token cost at rest.
#
# Reply delivery is deterministic: the agent WRITES its reply to .agent-reply.md
# (no GitHub tools needed), and the final step posts that file as the issue comment.
#
# NOTE: `issues.labeled` runs the copy of this file on the DEFAULT branch (main), and
# claude-code-action additionally requires the running workflow to match main. Use
# `workflow_dispatch` only for the non-Claude steps; the model runs on the main copy.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number carrying the task"
        required: true
        type: string

permissions:
  contents: read
  issues: write          # post the reply comment
  id-token: write        # Azure OIDC login

concurrency:
  group: agent-worker-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  worker:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'agent:worker'
    runs-on: ubuntu-latest
    # Azure OIDC secrets are scoped to the `dev` GitHub environment (as in ci.yml).
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch task (issue number + body)
        id: task
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUM="${{ github.event.issue.number || inputs.issue_number }}"
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          BODY=$(curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$NUM" \
            | jq -r '.body // ""')
          {
            echo "body<<__TASK_EOF__"
            echo "$BODY"
            echo "__TASK_EOF__"
          } >> "$GITHUB_OUTPUT"

      # TEMPORARY: reuse the platform's existing Anthropic key from Key Vault so the dev
      # mesh needs no new secret. TODO (tech debt): give the dev mesh its own key/budget —
      # see docs/roadmap/agent-mesh-spike.md.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Anthropic key from Key Vault
        run: |
          KEY="$(az keyvault secret show --vault-name kv-aisdlc-81c0 --name AnthropicApiKey --query value -o tsv)"
          echo "::add-mask::$KEY"
          echo "ANTHROPIC_API_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Run worker agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          # Sonnet is plenty for worker tasks (Opus thrashed + cost ~$0.55). Read-only
          # toolset + Write (for the reply file). Bounded turns to cap cost.
          claude_args: "--max-turns 8 --model claude-sonnet-4-6 --allowedTools Read,Grep,Glob,Write"
          prompt: |
            You are the "yorrixx-agents" worker in repo ${{ github.repository }}, dispatched by the
            orchestrator via issue #${{ steps.task.outputs.number }}.

            TASK (verbatim from the issue):
            ${{ steps.task.outputs.body }}

            Use the Read / Grep / Glob tools against the repo to complete the task. Do NOT run shell,
            git, or GitHub commands — you have no need for them.

            When finished, use the Write tool to create a file at the repo root named `.agent-reply.md`
            containing EXACTLY this block (the workflow posts it back to the issue):

            <!-- yorrixx:reply v=1 -->
            ### 🤖 Worker reply — ${{ github.repository }}
            **Status:** COMPLETE | BLOCKED | FAILED
            **Summary:** <one line>
            **Details:**
            <your answer>

      - name: Post worker reply
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .agent-reply.md ]; then
            BODY="$(cat .agent-reply.md)"
          else
            BODY="⚠️ Worker did not produce \`.agent-reply.md\` — see the Actions run log for this job."
          fi
          jq -nc --arg b "$BODY" '{body: $b}' | curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.task.outputs.number }}/comments" \
            -d @-

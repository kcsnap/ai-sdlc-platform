name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AiSdlc.sln

      - name: Build
        run: dotnet build AiSdlc.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AiSdlc.sln --configuration Release --no-build
